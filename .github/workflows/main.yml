      - name: Generate Android Project & Build APK
        run: |
          # 1. Создаем структуру папок
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values

          # 2. Копируем ТВОИ исходники
          cp src/*.cpp app/src/main/cpp/
          cp src/*.h app/src/main/cpp/

          # ДИАГНОСТИКА: Проверяем, скопировались ли файлы
          echo "=== Файлы в папке C++ ==="
          ls -la app/src/main/cpp/

          # 3. Генерируем AndroidManifest.xml
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Cubic Battle"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name="android.app.NativeActivity"
                            android:exported="true"
                            android:configChanges="orientation|keyboardHidden|screenSize">
                      <meta-data android:name="android.app.lib_name" android:value="cubicbattle" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Cubic Battle</string>
          </resources>
          EOF

          # 4. Генерируем CMakeLists.txt
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.18.1)
          project("cubicbattle")

          find_library(android-lib android)
          find_library(log-lib log)
          find_library(egl-lib EGL)
          find_library(gles-lib GLESv2)

          find_package(native_app_glue REQUIRED CONFIG)

          file(GLOB SOURCES "*.cpp")
          add_library(cubicbattle SHARED ${SOURCES})

          target_link_libraries(cubicbattle
              native_app_glue
              ${android-lib}
              ${log-lib}
              ${egl-lib}
              ${gles-lib}
          )
          EOF

          # 5. Генерируем Gradle
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CubicBattle"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.cubicbattle.nativeapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.cubicbattle.nativeapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  externalNativeBuild {
                      cmake {
                          cppFlags "-std=c++17"
                          arguments "-DANDROID_STL=c++_shared"
                      }
                  }
                  ndk {
                      abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
                  }
              }
              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                      version "3.22.1"
                  }
              }
          }
          dependencies {}
          EOF

          # Очистка кэша
          rm -rf app/.cxx .gradle

          # ДИАГНОСТИКА: Пробуем запустить CMake напрямую, чтобы увидеть ошибку без мусора Gradle
          echo "=== Запуск CMake Configure ==="
          cd app/src/main/cpp
          /usr/local/lib/android/sdk/cmake/3.22.1/bin/cmake -DCMAKE_BUILD_TYPE=Debug -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-24 -DCMAKE_TOOLCHAIN_FILE=/usr/local/lib/android/sdk/ndk/25.1.8937393/build/cmake/android.toolchain.cmake -B build .
          cd ../../../

          # Сборка
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | head -n 200
