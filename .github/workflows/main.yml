name: Build Pure C++ APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android Project & Build APK
        run: |
          # 1. Создаем структуру папок Android-проекта
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/values

          # 2. Копируем ТВОИ исходники из папки src/ в папку C++ проекта
          cp src/*.cpp app/src/main/cpp/

          # 3. Генерируем AndroidManifest.xml (NativeActivity - без Java)
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.cubicbattle.nativeapp">
              <application
                  android:label="Cubic Battle"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name="android.app.NativeActivity"
                            android:exported="true"
                            android:configChanges="orientation|keyboardHidden|screenSize">
                      <meta-data android:name="android.app.lib_name" android:value="cubicbattle" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 4. Генерируем строки (название приложения)
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">Cubic Battle</string>
          </resources>
          EOF

          # 5. Генерируем CMakeLists.txt (автоматически скачивает SDL2 и собирает твои .cpp)
          cat << 'EOF' > app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.18.1)
          project("cubicbattle")

          include(FetchContent)
          FetchContent_Declare(
              sdl2
              GIT_REPOSITORY https://github.com/libsdl-org/SDL.git
              GIT_TAG release-2.30.0
          )
          FetchContent_MakeAvailable(sdl2)

          # Автоматически берем все .cpp файлы из этой папки
          file(GLOB SOURCES "*.cpp")
          add_library(cubicbattle SHARED ${SOURCES})
          target_link_libraries(cubicbattle SDL2::SDL2 SDL2::SDL2main android log)
          EOF

          # 6. Генерируем настройки Gradle
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CubicBattle"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.cubicbattle.nativeapp'
              compileSdk 34
              defaultConfig {
                  applicationId "com.cubicbattle.nativeapp"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  externalNativeBuild {
                      cmake {
                          cppFlags ""
                          arguments "-DANDROID_STL=c++_shared"
                      }
                  }
                  ndk {
                      abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
                  }
              }
              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                      version "3.22.1"
                  }
              }
          }
          dependencies {}
          EOF

          # 7. Устанавливаем Gradle Wrapper и собираем APK
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-PureCPP
          path: app/build/outputs/apk/debug/*.apk
